name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build JAR
        run: mvn -B clean package

      - name: Find shaded JAR
        id: jar
        run: |
          JAR=$(find target -maxdepth 1 -type f -name "*.jar" \
            ! -name "original-*.jar" \
            ! -name "*sources*" \
            ! -name "*javadoc*" \
            | head -n 1)

          echo "jar=$JAR" >> "$GITHUB_OUTPUT"
          echo "Found JAR: $JAR"

      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: ${{ steps.jar.outputs.jar }}